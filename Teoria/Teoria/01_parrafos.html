Se tienen 6 tipos de encabezados, desde el h1 hasta el h6-->

    <h2>Subtitulo</h2>
    <h3>Subtitulo</h3>
    <h4>Subtitulo</h4>
    <h5>Subtitulo</h5>

    <!--Parrafo: los parrafos deben tener una idea clara o punto especifico

    Un parrafp puede tratar de mejorar la salud cardiovascular y otro puede ser sobre los beneficios y cuidados de la salud mental. Finalmente, debe de existi un motivo para que exista un parrafo-->
